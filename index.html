<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Elite Bank — Sign In</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">


    <main class="login-wrapper">
        

        <div class="auth-card">
            
          
            <div class="auth-logo">ELITE<span>BANK</span></div>
            
            <h2>Sign In</h2>
            <p class="auth-subtitle">Меню авторизации</p>

          
<form action="glavnaya.html" method="get" class="auth-form">
    
   
    <div class="input-group">
        <label for="inn-field">ИНН / ID паспорта</label>
        <input type="text" id="inn-field" placeholder="Введите 14 цифр своего ИНН" required autocomplete="off">
    </div>

    <div class="input-group">
        <label for="pass-field">Пароль</label>
        <input type="password" id="pass-field" placeholder="••••••••" required>
    </div>

    <button type="submit" class="submit-auth-btn">
        Войти
    </button>

</form>

        </div>
    </main>

</body>
</html>
